services:
  - type: web
    name: lexcore
    env: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ID
        value: lexcore
      - key: APP_SECRET
        value: lexcore-secret
      # - key: GROQ_API_KEY
      #   value: set-via-render-dashboard
